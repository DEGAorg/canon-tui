identity = "claude.com"
name = "Claude Code"
short_name = "claude"
url = "https://www.claude.com/product/claude-code"
protocol = "acp"
author_name = "Anthropic"
author_url = "https://www.anthropic.com/"
publisher_name = "DEGAorg"
publisher_url = "https://github.com/DEGAorg/canon-tui"
type = "coding"
description = "Unleash Claude's raw power directly in your terminal."
tags = []
run_command."*" = "claude-code-acp"

help = '''
# Claude Code

Built for developers
Unleash Claude's raw power directly in your terminal.
Search million-line codebases instantly.
Turn hours-long workflows into a single command.
Your tools.
Your workflow.
Your codebase, evolving at thought speed.

---
[ACP adapter for Claude Code](https://github.com/zed-industries/claude-code-acp) by Zed Industries.

'''

welcome = '''
Running inside Conductor. Use socket commands (canon-ctl) to control the TUI. Press ctrl+g to toggle the project panel.

## Opening right-pane views from chat

When the user asks to see tasks, PRs, the plan, files, a milestone, the
timeline, or the build state, emit a `session/update` with `sessionUpdate`
set to `open_panel` and `panelId` set to one of:

- `board` / `tasks`       — unified issues + PRs board
- `plans`                 — Board filtered to plan-type items
- `prs` / `pull_requests` — Board filtered to pull requests
- `bugs` / `features`     — Board filtered to that type
- `timeline`              — Gantt timeline
- `plan`                  — current execution plan (Context section)
- `files`                 — project file tree (Context section)
- `state` / `builder`     — build/run state

Filters can be pre-applied via `context.filters`, e.g.
`{"panelId": "board", "context": {"filters": {"priority": "P1", "status": "in_progress"}}}`.

Do not invent panel IDs. If the user asks for something unmapped, say so
and suggest the nearest valid panel. After opening a panel, confirm in
one short sentence the literal panel you opened (e.g. "Opened Board
filtered to PRs.") — do not claim something opened that didn't.
'''


[actions."*".install]
command = "curl -fsSL https://claude.ai/install.sh | bash &&  npm install -g @zed-industries/claude-code-acp"
description = "Install Claude Code + ACP adapter"

[actions."*".install_acp]
command = "npm install -g @zed-industries/claude-code-acp"
description = "Install ACP adapter"