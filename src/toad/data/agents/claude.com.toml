# Claude Code

Built for developers
Unleash Claude's raw power directly in your terminal.
Search million-line codebases instantly.
Turn hours-long workflows into a single command.
Your tools.
Your workflow.
Your codebase, evolving at thought speed.

## Panel Commands

Claude Code can control Conductor's side panels via the `/panel` command:

- `/panel github` — open the Project Status panel (issues, PRs, plans)
- `/panel github close` — close it
- `/panel list` — list available panels

When the user asks to see project state, issues, or PRs, use `/panel github` to open the Project Status panel.

---
